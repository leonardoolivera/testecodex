name: DOU Scraper - Execução Automática

on:
  schedule:
    - cron: '0 9 * * *'  # Todo dia às 06:00 horário de Brasília (09:00 UTC)
  workflow_dispatch:       # Permite disparar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Necessário para fazer commit no repositório

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar scraper
        run: python main.py

      - name: Commitar resultados no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados/
          git diff --cached --quiet || git commit -m "chore: atualiza resultados DOU $(date +'%Y-%m-%d')"
          git push

      - name: Fazer upload do log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: scraper.log
          retention-days: 7
