name: DOU Scraper - IFMS

on:
  schedule:
    - cron: '0 9 * * 1-5'   # Diário, segunda a sexta às 06:00 Brasília (09:00 UTC)
    - cron: '0 10 * * 1'    # Relatório semanal toda segunda-feira (semana anterior)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de execução'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - backfill
      start_date:
        description: 'Data inicial (YYYY-MM-DD) — somente para backfill'
        required: false
      end_date:
        description: 'Data final (YYYY-MM-DD) — somente para backfill'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar scraper (agendado diário)
        if: github.event_name == 'schedule' && github.event.schedule == '0 9 * * 1-5'
        run: python main.py --mode daily

      - name: Executar scraper (agendado semanal)
        if: github.event_name == 'schedule' && github.event.schedule == '0 10 * * 1'
        run: python main.py --mode weekly

      - name: Executar scraper (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.mode }}" = "backfill" ]; then
            python main.py --mode backfill \
              --start "${{ github.event.inputs.start_date }}" \
              --end "${{ github.event.inputs.end_date }}"
          else
            python main.py --mode ${{ github.event.inputs.mode }}
          fi

      - name: Commitar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados/
          git diff --cached --quiet || git commit -m "chore: resultados DOU $(date +'%Y-%m-%d')"
          git push

      - name: Upload do log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: scraper.log
          retention-days: 7
